<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socinga Africa - Ecosystem Organogram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 20px; }
        .org-container { width: 100%; max-width: 1200px; margin: 0 auto; overflow-x: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .box-board { fill: #d97706; stroke: #92400e; stroke-width: 2; rx: 8; }
        .box-exec { fill: #1e293b; stroke: #0f172a; stroke-width: 2; rx: 8; }
        .box-dir { fill: #f1f5f9; stroke: #334155; stroke-width: 2; rx: 6; }
        .box-hod { fill: white; stroke: #cbd5e1; stroke-width: 2; rx: 6; }
        .txt-title { font-size: 14px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
        .txt-name { font-size: 12px; fill: #fef3c7; text-anchor: middle; }
        .txt-exec-title { font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
        .txt-exec-name { font-size: 11px; fill: #e2e8f0; text-anchor: middle; }
        .txt-dark-title { font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
        .txt-dark-name { font-size: 12px; fill: #b45309; text-anchor: middle; }
        .txt-hod { font-size: 12px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
        .link { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-linejoin: round; }
    </style>
</head>
<body>
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-900">SOCINGA AFRICA ECOSYSTEM ORGANOGRAM</h1>
        <p class="text-slate-500 mt-2">Board of Directors & Executive Management Structure</p>
    </div>

    <div class="org-container">
        <svg viewBox="0 0 1100 700" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <path class="link" d="M 550,80 L 550,110" />
            <path class="link" d="M 550,140 L 550,160 L 250,160 L 250,170" />
            <path class="link" d="M 550,160 L 850,160 L 850,170" />
            <path class="link" d="M 550,230 L 550,260" />
            <path class="link" d="M 550,320 L 550,340 L 150,340 L 150,370" />
            <path class="link" d="M 550,340 L 350,340 L 350,370" />
            <path class="link" d="M 550,340 L 550,370" />
            <path class="link" d="M 550,340 L 750,340 L 750,370" />
            <path class="link" d="M 550,340 L 950,340 L 950,370" />
            <path class="link" d="M 550,430 L 550,460" stroke-dasharray="4"/>
            <path class="link" d="M 550,480 L 150,480 L 150,510" stroke-dasharray="4"/>
            <path class="link" d="M 550,480 L 310,480 L 310,510" stroke-dasharray="4"/>
            <path class="link" d="M 550,480 L 470,480 L 470,510" stroke-dasharray="4"/>
            <path class="link" d="M 550,480 L 630,480 L 630,510" stroke-dasharray="4"/>
            <path class="link" d="M 550,480 L 790,480 L 790,510" stroke-dasharray="4"/>
            <path class="link" d="M 550,480 L 950,480 L 950,510" stroke-dasharray="4"/>

            <g transform="translate(430, 20)">
                <rect width="240" height="60" class="box-board" />
                <text x="120" y="28" class="txt-title">BOARD OF DIRECTORS</text>
                <text x="120" y="46" class="txt-name">Chair: Mr Tsekane Lukie Tshabalala</text>
            </g>

            <g transform="translate(450, 110)">
                <rect width="200" height="60" class="box-dir" />
                <text x="100" y="35" class="txt-dark-title">Senior Executive Management</text>
            </g>

            <g transform="translate(150, 170)">
                <rect width="200" height="60" class="box-exec" />
                <text x="100" y="28" class="txt-exec-title">Chief Financial Officer</text>
                <text x="100" y="46" class="txt-exec-name">Mr Mike Dotsey</text>
            </g>

            <g transform="translate(450, 170)">
                <rect width="200" height="60" class="box-board" />
                <text x="100" y="28" class="txt-title">Managing Director</text>
                <text x="100" y="46" class="txt-name">Ms Jabulile Dladla</text>
            </g>

            <g transform="translate(750, 170)">
                <rect width="200" height="60" class="box-exec" />
                <text x="100" y="28" class="txt-exec-title">Chief Executive Officer</text>
                <text x="100" y="46" class="txt-exec-name">Mr Whitemore Ngwira</text>
            </g>

            <g transform="translate(425, 260)">
                <rect width="250" height="60" class="box-dir" />
                <text x="125" y="28" class="txt-dark-title">Director Corporate Services</text>
                <text x="125" y="46" class="txt-dark-name">Ms O Mlokoti</text>
            </g>

            <g transform="translate(70, 370)"><rect width="160" height="60" class="box-hod"/><text x="80" y="25" class="txt-hod">HOD</text><text x="80" y="42" class="txt-hod">Corporate Social Resp.</text></g>
            <g transform="translate(270, 370)"><rect width="160" height="60" class="box-hod"/><text x="80" y="25" class="txt-hod">HOD</text><text x="80" y="42" class="txt-hod">Mining</text></g>
            <g transform="translate(470, 370)"><rect width="160" height="60" class="box-hod"/><text x="80" y="25" class="txt-hod">HOD</text><text x="80" y="42" class="txt-hod">Creative Studios</text></g>
            <g transform="translate(670, 370)"><rect width="160" height="60" class="box-hod"/><text x="80" y="25" class="txt-hod">HOD</text><text x="80" y="42" class="txt-hod">Executive Admin</text></g>
            <g transform="translate(870, 370)"><rect width="160" height="60" class="box-hod"/><text x="80" y="25" class="txt-hod">HOD</text><text x="80" y="42" class="txt-hod">Digital Infrastructure</text></g>

            <g transform="translate(450, 465)"><rect width="200" height="30" fill="white" /><text x="100" y="20" class="txt-dark-title" style="fill: #d97706;">DIRECTOR: CORPORATE SERVICES</text></g>

            <g transform="translate(80, 510)"><rect width="140" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="4"/><text x="70" y="25" class="txt-hod">Legal Services</text></g>
            <g transform="translate(240, 510)"><rect width="140" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="4"/><text x="70" y="25" class="txt-hod">Human Resources</text></g>
            <g transform="translate(400, 510)"><rect width="140" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="4"/><text x="70" y="25" class="txt-hod">Industrial Relations</text></g>
            <g transform="translate(560, 510)"><rect width="140" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="4"/><text x="70" y="25" class="txt-hod">Facilities Mngmt</text></g>
            <g transform="translate(720, 510)"><rect width="140" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="4"/><text x="70" y="25" class="txt-hod">Health & Safety</text></g>
            <g transform="translate(880, 510)"><rect width="140" height="40" fill="#f8fafc" stroke="#cbd5e1" rx="4"/><text x="70" y="25" class="txt-hod">Public Relations</text></g>
        </svg>
    </div>
</body>
</html>
